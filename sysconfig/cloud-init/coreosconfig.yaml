#cloud-config

coreos:
  etcd:
    name: node001
    discovery: https://discovery.etcd.io/87a67dffc0e44fbea565b153b5442a5b
    addr: $private_ipv4:4001
    peer-addr: $private_ipv4:7001
  units:
    - name: etcd.service
      command: start
    - name: fleet.service
      command: start
    - name: extra.mount
      command: start
      content: |
        [Mount]
        What=/dev/disk/by-id/gogle-extra20-part1
        Where=/mnt/extra
        Type=btrfs


